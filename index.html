    <style>
        :root{--bg:#111827;--surface:#1f2937;--surface-light:#374151;--primary:#2563eb;--success:#16a34a;--danger:#dc2626;--text:#f3f4f6;--text-muted:#9ca3af;}
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;overscroll-behavior-y:none;}
        input,select,textarea{font-size:16px;background:var(--surface-light);color:var(--text);border:none;border-radius:8px;padding:12px;width:100%;outline:none;}
        button{background:var(--primary);color:white;border:none;padding:12px;border-radius:8px;font-weight:bold;cursor:pointer;width:100%;display:flex;justify-content:center;align-items:center;gap:8px;font-size:16px;}
        button.ghost{background:transparent;color:var(--primary);width:auto;padding:8px;}
        button.danger{background:var(--danger);width:auto;padding:8px;}
        button.success{background:var(--success);}
        button.secondary{background:var(--surface-light);color:var(--text);}
        #app-container{display:flex;flex-direction:column;height:100vh;max-width:500px;margin:0 auto;position:relative;background:var(--bg);}
        .content{flex:1;overflow-y:auto;padding:16px;padding-bottom:80px;}
        .card{background:var(--surface);border-radius:12px;padding:16px;margin-bottom:16px;}
        .flex{display:flex;} .flex-col{display:flex;flex-direction:column;} .justify-between{justify-content:space-between;} .items-center{align-items:center;} .gap-2{gap:8px;}
        .text-sm{font-size:.875rem;} .text-xs{font-size:.75rem;} .font-bold{font-weight:bold;} .text-muted{color:var(--text-muted);} .text-primary{color:var(--primary);}
        .grid-sets{display:grid;grid-template-columns:40px 1fr 1fr 1fr 40px;gap:8px;align-items:center;margin-bottom:8px;} .grid-sets input{padding:8px 4px;text-align:center;}
        .nav{position:absolute;bottom:0;left:0;right:0;background:var(--surface);display:flex;padding-bottom:env(safe-area-inset-bottom, 0px);border-top:1px solid var(--surface-light);z-index:40;}
        .nav-btn{flex:1;background:transparent;flex-direction:column;color:var(--text-muted);padding:12px 0;border-radius:0;gap:4px;} .nav-btn.active{color:var(--primary);}
        .nav-btn svg{width:24px;height:24px;fill:currentColor;}
        .timer-fab{position:absolute;top:16px;right:16px;background:var(--primary);padding:8px 16px;border-radius:24px;font-family:monospace;font-weight:bold;z-index:50;}
        .msg{padding:12px;border-radius:12px;max-width:85%;margin-bottom:12px;white-space:pre-wrap;font-size:15px;}
        .msg.user{background:var(--primary);margin-left:auto;border-bottom-right-radius:4px;} .msg.bot{background:var(--surface);margin-right:auto;border-bottom-left-radius:4px;}
    </style>
