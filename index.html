<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
   <title>Perfect Lift Pro</title>
   <style>
       :root{--bg:#111827;--surface:#1f2937;--surface-light:#374151;--primary:#2563eb;--success:#16a34a;--danger:#dc2626;--text:#f3f4f6;--text-muted:#9ca3af;}
       *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
       body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;overscroll-behavior-y:none;}
       input,select,textarea{font-size:16px;background:var(--surface-light);color:var(--text);border:none;border-radius:8px;padding:12px;width:100%;outline:none;}
       input[type="number"]::-webkit-inner-spin-button,input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
       button{background:var(--primary);color:white;border:none;padding:12px;border-radius:8px;font-weight:bold;cursor:pointer;width:100%;display:flex;justify-content:center;align-items:center;gap:8px;font-size:16px;}
       button.ghost{background:transparent;color:var(--primary);width:auto;padding:8px;} button.danger{background:var(--danger);width:auto;padding:8px;}
       button.success{background:var(--success);} button.secondary{background:var(--surface-light);color:var(--text);}
       #app-container{display:flex;flex-direction:column;height:100dvh;max-width:500px;margin:0 auto;position:relative;background:var(--bg);}
       .content{flex:1;overflow-y:auto;padding:16px;padding-bottom:90px;}
       .card{background:var(--surface);border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);}
       .flex{display:flex;} .flex-col{display:flex;flex-direction:column;} .justify-between{justify-content:space-between;} .items-center{align-items:center;} .gap-2{gap:8px;}
       .text-sm{font-size:.875rem;} .text-xs{font-size:.75rem;} .font-bold{font-weight:bold;} .text-muted{color:var(--text-muted);} .text-primary{color:var(--primary);}
       .grid-sets{display:grid;grid-template-columns:40px 1fr 1fr 1fr 40px;gap:8px;align-items:center;margin-bottom:8px;} .grid-sets input{padding:8px 4px;text-align:center;}
       .nav{position:absolute;bottom:0;left:0;right:0;background:var(--surface);display:flex;padding-bottom:env(safe-area-inset-bottom, 0px);border-top:1px solid var(--surface-light);z-index:40;}
       .nav-btn{flex:1;background:transparent;flex-direction:column;color:var(--text-muted);padding:8px 0;border-radius:0;gap:4px;font-size:10px;text-transform:uppercase;font-weight:bold;} .nav-btn.active{color:var(--primary);}
       .nav-btn svg{width:22px;height:22px;fill:currentColor;margin:0 auto;}
       .timer-fab{position:absolute;top:16px;right:16px;background:var(--primary);padding:8px 16px;border-radius:24px;font-family:monospace;font-weight:bold;z-index:50;box-shadow:0 4px 12px rgba(37,99,235,0.4);}
       .msg{padding:12px;border-radius:12px;max-width:85%;margin-bottom:12px;white-space:pre-wrap;font-size:15px;word-break:break-word;}
       .msg.user{background:var(--primary);margin-left:auto;border-bottom-right-radius:4px;} .msg.bot{background:var(--surface);margin-right:auto;border-bottom-left-radius:4px;}
       .modal{position:absolute;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:60;display:flex;flex-direction:column;padding:16px;}
       .chart-container{display:flex;align-items:flex-end;height:120px;gap:4px;padding-top:16px;border-bottom:1px solid var(--surface-light);margin-bottom:8px;}
       .chart-bar-wrap{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;height:100%;}
       .chart-bar{width:100%;background:var(--primary);border-radius:4px 4px 0 0;min-height:2px;transition:height 0.5s ease;}
   </style>
   <script src="https://unpkg.com/preact@10.22.0/dist/preact.umd.js"></script>
   <script src="https://unpkg.com/preact@10.22.0/hooks/dist/hooks.umd.js"></script>
   <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
   <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
   <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
   <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
   <div id="root"></div>
   <script>
       const { h, render } = preact; const { useState, useEffect } = preactHooks; const html = htm.bind(h);
       const Icons = {
           lift: html`<svg viewBox="0 0 24 24"><path d="M20.5 10H19V7c0-1.1-.9-2-2-2h-2V3h-2v2H11V3H9v2H7c-1.1 0-2 .9-2 2v3H3.5c-.8 0-1.5.7-1.5 1.5v1c0 .8.7 1.5 1.5 1.5H5v3c0 1.1.9 2 2 2h2v2h2v-2h2v2h2v-2h2c1.1 0 2-.9 2-2v-3h1.5c.8 0 1.5-.7 1.5-1.5v-1c0-.8-.7-1.5-1.5-1.5z"/></svg>`,
           plan: html`<svg viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>`,
           trend: html`<svg viewBox="0 0 24 24"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/></svg>`,
           log: html`<svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>`,
           ai: html`<svg viewBox="0 0 24 24"><path d="M21 11c0-1.66-1.34-3-3-3h-1V6c0-1.66-1.34-3-3-3H10C8.34 3 7 4.34 7 6v2H6c-1.66 0-3 1.34-3 3v2c0 1.66 1.34 3 3 3h1v2c0 1.66 1.34 3 3 3h4c1.66 0 3-1.34 3-3v-2h1c1.66 0 3-1.34 3-3v-2zM9 13c-.83 0-1.5-.67-1.5-1.5S8.17 10 9 10s1.5.67 1.5 1.5S9.83 13 9 13zm6 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>`,
           settings: html`<svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>`,
           trash: html`<svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor;"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>`,
           check: html`<svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:currentColor;"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>`,
           swap: html`<svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor;"><path d="M16 17.01V10h-2v7.01h-3L15 21l4-3.99h-3zM9 3L5 6.99h3V14h2V6.99h3L9 3z"/></svg>`,
           plate: html`<svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-14c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm0 10c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4z"/></svg>`,
           share: html`<svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor;"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg>`
       };
       if (!firebase.apps.length) firebase.initializeApp({ apiKey: "AIzaSyCFUp7gU8ef2eoz4CypW3yHH2m0nWmqmC0", authDomain: "perfect-lift-3f1a4.firebaseapp.com", projectId: "perfect-lift-3f1a4" });
       const auth = firebase.auth(); const db = firebase.firestore();
       const defExs = ["Bench Press", "Squat", "Trap Bar Deadlift", "Overhead Press", "Barbell Row", "Pull Up", "Dips", "Romanian Deadlift", "Front Squat", "Leg Press", "Leg Curl", "Calf Raise", "Incline Bench Press", "Dumbbell Bench Press", "Dumbbell Fly", "Lateral Raise", "Front Raise", "Face Pull", "Tricep Pushdown", "Skullcrusher", "Bicep Curl", "Lat Pulldown", "Seated Cable Row", "Hip Thrust", "Lunge", "Bulgarian Split Squat", "Ab Wheel", "Cable Crunch", "Plank"];

       const App = () => {
           const [user, setUser] = useState('loading'); const [authErr, setAuthErr] = useState('');
           const [tab, setTab] = useState('workout'); const [exs, setExs] = useState(defExs);
           const [ros, setRos] = useState([]); const [his, setHis] = useState([]);
           const [act, setAct] = useState(() => JSON.parse(localStorage.getItem('pl_act')) || null);
           useEffect(() => { if (act) localStorage.setItem('pl_act', JSON.stringify(act)); else localStorage.removeItem('pl_act'); }, [act]);
           const [edt, setEdt] = useState(null); const [exMod, setExMod] = useState(null); const [exQ, setExQ] = useState('');
           const [plateCalc, setPlateCalc] = useState(null); const [barWeight, setBarWeight] = useState(45);
           const [tmr, setTmr] = useState(0); const [gem, setGem] = useState(localStorage.getItem('pl_gemini_key') || '');
           const [dbRef, setDbRef] = useState(null); const [sumMod, setSumMod] = useState(null);
           const [progEx, setProgEx] = useState(null);

           useEffect(() => {
               const auSub = auth.onAuthStateChanged(u => {
                   setUser(u);
                   if (u) {
                       const ref = db.collection('artifacts').doc('perfect-lift').collection('users').doc(u.uid).collection('data').doc('main');
                       setDbRef(ref);
                       ref.onSnapshot(s => {
                           if (s.exists) { const d = s.data(); if (d.exs) setExs(d.exs); if (d.ros) setRos(d.ros); if (d.his) setHis(d.his); 
                           } else ref.set({ exs: defExs, ros: [], his: [] });
                       });
                   } else setDbRef(null);
               });
               return () => auSub();
           }, []);

           const authAct = async (isReg) => {
               const e = document.getElementById('a-em').value; const p = document.getElementById('a-pw').value;
               if (!e || !p) return setAuthErr('Enter email and password'); setAuthErr('');
               try { if (isReg) await auth.createUserWithEmailAndPassword(e, p); else await auth.signInWithEmailAndPassword(e, p);
               } catch (err) { setAuthErr(err.message); }
           };

           const save = (e, r, h) => { setExs(e); setRos(r); setHis(h); if (dbRef) dbRef.set({ exs: e, ros: r, his: h }, { merge: true }); };
           useEffect(() => { if (tmr <= 0) return; const int = setInterval(() => setTmr(t => t - 1), 1000); if (tmr === 1 && navigator.vibrate) navigator.vibrate([300, 100, 300]); return () => clearInterval(int); }, [tmr]);

           const getProgression = (n) => { for (let w of his) for (let e of w.exs) if (e.name === n && e.sets.length > 0) { let m = Math.max(...e.sets.map(s => Number(s.w) || 0)); let rHit = e.sets.every(s => s.c && Number(s.r) > 0); return m > 0 ? (rHit ? m + 5 : m).toString() : ''; } return ''; };
           const getLastRest = (n) => { for (let w of his) for (let e of w.exs) if (e.name === n && e.rest) return e.rest; return 90; };
           const calcPlates = (w, bw) => { let weight = Number(w); if(!weight || weight <= bw) return `Bar only (${bw}lbs)`; let ps = (weight - bw) / 2; const p = [45, 35, 25, 10, 5, 2.5]; let res = []; for(let plt of p) { while(ps >= plt) { res.push(plt); ps -= plt; } } return res.map(x => `[${x}]`).join(" ") + " per side"; };
           const calcVol = (wObj) => wObj.exs.reduce((tot, ex) => tot + ex.sets.reduce((sTot, s) => s.c ? sTot + ((Number(s.w)||0) * (Number(s.r)||0)) : sTot, 0), 0);
           const formatShare = (w) => { let t = `Workout: ${w.name}\nDate: ${new Date(w.date).toLocaleDateString()}\n\n`; w.exs.forEach(e => { let h = false; e.sets.forEach((s,i) => { if(s.c) { if(!h){ t += `${e.name}:\n`; h=true; } t += `  Set ${i+1}: ${s.w}lbs x ${s.r}${s.rpe ? ' @RPE '+s.rpe : ''}\n`; } }); }); return t; };

           if (user === 'loading') return html`<div id="app-container" style="justify-content:center; align-items:center;">Loading...</div>`;
           if (user === null) return html`<div id="app-container" style="justify-content:center; padding:24px;"><h1 class="font-bold text-3xl mb-2 text-center text-primary">Perfect Lift Pro</h1><p class="text-center text-muted mb-8">Sign in to securely sync your data across devices.</p><input id="a-em" type="email" placeholder="Email" class="mb-4" /><input id="a-pw" type="password" placeholder="Password" class="mb-6" /><button onClick=${() => authAct(false)} class="mb-4">Login</button><button class="secondary" onClick=${() => authAct(true)}>Create Account</button><div class="text-center text-xs text-danger mt-4">${authErr}</div></div>`;

           const renderExModal = () => {
               if (!exMod) return null; const filEx = exs.filter(e => e.toLowerCase().includes(exQ.toLowerCase()));
               return html`<div class="modal"><h3 class="font-bold mb-2">Select Exercise</h3><input placeholder="Search exercises..." value=${exQ} onInput=${e => setExQ(e.target.value)} class="mb-4" autofocus/><div style="flex:1;overflow-y:auto;" class="flex-col gap-2">${filEx.map(e => html`<button class="secondary" style="justify-content:flex-start;" onClick=${() => { if(exMod.t === 'addWrk') { let nw = {...act}; nw.exs.push({name: e, rest: getLastRest(e), sets: [{w:getProgression(e), r:'', rpe:'', c:false}]}); setAct(nw); } else if (exMod.t === 'swpWrk') { let nw = {...act}; nw.exs[exMod.i].name = e; nw.exs[exMod.i].rest = getLastRest(e); setAct(nw); } else if (exMod.t === 'addRtn') { let nr = {...edt}; nr.days[exMod.dI].ex.push(e); setEdt(nr); } setExMod(null); setExQ(''); }}>${e}</button>`)}${filEx.length === 0 ? html`<div class="text-muted text-center mt-4">No exercises found. Add custom ones in Settings.</div>` : ''}</div><button class="danger mt-4" onClick=${() => {setExMod(null); setExQ('');}}>Cancel</button></div>`;
           };

           const renderSumModal = () => {
               if (!sumMod) return null; const curVol = calcVol(sumMod); const timeSp = Math.max(1, Math.round((Date.now() - sumMod.date) / 60000));
               const recent = [...his].slice(0,6).reverse(); recent.push(sumMod); const maxVol = Math.max(...recent.map(w => calcVol(w)), 1);
               return html`<div class="modal" style="background:var(--bg); z-index:100; justify-content:center;"><h2 class="font-bold text-3xl text-center text-primary mb-2">Workout Complete!</h2><p class="text-center text-muted mb-8">${sumMod.name}</p><div class="grid-sets" style="grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px;"><div class="card" style="text-align:center; margin:0; padding:24px 16px;"><div class="text-xs text-muted font-bold uppercase tracking-wider mb-2">Total Volume</div><div class="text-2xl font-bold">${curVol.toLocaleString()} lbs</div></div><div class="card" style="text-align:center; margin:0; padding:24px 16px;"><div class="text-xs text-muted font-bold uppercase tracking-wider mb-2">Time Elapsed</div><div class="text-2xl font-bold">${timeSp} min</div></div></div><div class="card mb-8"><div class="text-xs text-muted font-bold uppercase tracking-wider mb-2 text-center">Volume Trend (Recent)</div><div class="chart-container">${recent.map((w, i) => html`<div class="chart-bar-wrap"><div class="chart-bar ${i===recent.length-1 ? 'bg-success' : ''}" style="height:${Math.round((calcVol(w)/maxVol)*100)}%;"></div></div>`)}</div></div><button class="success py-4 text-lg" onClick=${() => { save(exs, ros, [{...sumMod, end: Date.now()}, ...his]); setAct(null); setSumMod(null); setTmr(0); }}>Save & Close</button></div>`;
           };

           const rWrk = () => {
               if (!act) return html`<div><h2 class="font-bold text-lg mb-4">Start Workout</h2>${ros.map(r => html`<div class="card"><h3 class="font-bold mb-2">${r.name}</h3><div class="flex gap-2" style="overflow-x:auto;">${r.days.map(d => html`<button class="secondary text-sm" style="width:auto;white-space:nowrap;" onClick=${() => setAct({ name: `${r.name} - ${d.name}`, date: Date.now(), note: '', exs: d.ex.map(e => ({ name: e, rest: getLastRest(e), sets: [{ w: getProgression(e), r: '', rpe: '', c: false }] })) })}>${d.name}</button>`)}</div></div>`)}<button class="secondary mt-4" onClick=${() => setAct({ name: 'Custom Workout', date: Date.now(), note: '', exs: [] })}>Start Empty Workout</button></div>`;
               return html`<div><div class="flex justify-between items-center mb-2"><h2 class="font-bold">${act.name}</h2><button class="success" style="width:auto;padding:6px 16px;" onClick=${() => setSumMod(act)}>Finish</button></div><input class="text-sm mb-4 bg-transparent border-b border-[var(--surface-light)] rounded-none px-0" placeholder="Workout notes..." value=${act.note || ''} onInput=${e => setAct({...act, note: e.target.value})} />${act.exs.map((ex, eI) => html`<div class="card" style="padding:12px;"><div class="flex justify-between items-center mb-2"><h3 class="font-bold text-primary">${ex.name}</h3><div class="flex gap-2 items-center"><input type="number" style="width:55px; padding:4px 0; text-align:center; font-size:14px;" value=${ex.rest || 90} onInput=${e => { let nw = { ...act }; nw.exs[eI].rest = parseInt(e.target.value) || 0; setAct(nw); }} title="Rest Timer (seconds)" /><span class="text-xs text-muted" style="margin-right:4px;">s</span><button class="secondary" onClick=${() => setPlateCalc(ex.sets.length ? ex.sets[ex.sets.length-1].w : null)} title="Plate Math" style="padding:4px 8px;">${Icons.plate}</button><button class="secondary" onClick=${() => setExMod({ t: 'swpWrk', i: eI })} title="Swap" style="padding:4px 8px;">${Icons.swap}</button><button class="danger" onClick=${() => { let nw = { ...act }; nw.exs.splice(eI, 1); setAct(nw); }} title="Delete" style="padding:4px 8px;">${Icons.trash}</button></div></div><div class="grid-sets text-xs text-muted font-bold" style="margin-bottom:4px;"><div style="text-align:center;">SET</div><div>LBS</div><div>REPS</div><div>RPE</div><div style="text-align:center;">✓</div></div>${ex.sets.map((set, sI) => html`<div class="grid-sets" style="opacity:${set.c ? 0.5 : 1}; transition: opacity 0.2s;"><div class="text-sm font-bold" style="text-align:center;background:var(--surface-light);padding:8px;border-radius:8px;">${sI + 1}</div><input type="number" placeholder="-" value=${set.w} onInput=${e => { let nw = { ...act }; nw.exs[eI].sets[sI].w = e.target.value; setAct(nw); }}/><input type="number" placeholder="-" value=${set.r} onInput=${e => { let nw = { ...act }; nw.exs[eI].sets[sI].r = e.target.value; setAct(nw); }}/><input type="number" placeholder="-" value=${set.rpe} onInput=${e => { let nw = { ...act }; nw.exs[eI].sets[sI].rpe = e.target.value; setAct(nw); }}/><button class=${set.c ? 'success' : 'secondary'} style="padding:8px;" onClick=${() => { let nw = { ...act }; nw.exs[eI].sets[sI].c = !nw.exs[eI].sets[sI].c; if (nw.exs[eI].sets[sI].c) setTmr(nw.exs[eI].rest || 90); setAct(nw); }}>${Icons.check}</button></div>`)}<button class="ghost text-sm mt-2" onClick=${() => { let nw = { ...act }; let lst = nw.exs[eI].sets[nw.exs[eI].sets.length - 1]; nw.exs[eI].sets.push(lst ? { ...lst, c: false } : { w: '', r: '', rpe: '', c: false }); setAct(nw); }}>+ Add Set</button></div>`)}<button class="secondary mt-4" onClick=${() => setExMod({ t: 'addWrk' })}>+ Add Exercise</button></div>`;
           };

           const rRtn = () => {
               if (edt) return html`<div><button class="ghost mb-2" onClick=${() => setEdt(null)}>← Back</button><input class="font-bold mb-4 text-lg" value=${edt.name} onInput=${e => setEdt({ ...edt, name: e.target.value })} />${edt.days.map((d, dI) => html`<div class="card"><div class="flex justify-between items-center mb-4 gap-2"><input class="font-bold" value=${d.name} onInput=${e => { let nr = { ...edt }; nr.days[dI].name = e.target.value; setEdt(nr); }} /><button class="danger" onClick=${() => { let nr = { ...edt }; nr.days.splice(dI, 1); setEdt(nr); }}>${Icons.trash}</button></div>${d.ex.map((e, eI) => html`<div class="flex justify-between items-center mb-2 bg-[var(--surface-light)] p-2 rounded"><span class="text-sm">${e}</span><button class="danger" style="padding:4px 8px" onClick=${() => { let nr = { ...edt }; nr.days[dI].ex.splice(eI, 1); setEdt(nr); }}>✕</button></div>`)}<button class="secondary mt-2 text-sm" onClick=${() => setExMod({ t: 'addRtn', dI })}>+ Add Exercise to Day</button></div>`)}<button class="secondary mb-4" onClick=${() => setEdt({ ...edt, days: [...edt.days, { name: `Day ${edt.days.length + 1}`, ex: [] }] })}>+ Add Day</button><button onClick=${() => { let ro = [...ros]; let i = ro.findIndex(r => r.id === edt.id); if (i > -1) ro[i] = edt; else ro.push(edt); save(exs, ro, his); setEdt(null); }}>Save Routine</button></div>`;
               return html`<div><h2 class="font-bold text-lg mb-4">Routines</h2><div class="flex gap-2 mb-4"><input id="n-ro" placeholder="New Name" /><button style="width:auto" onClick=${() => { const i = document.getElementById('n-ro'); if (!i.value) return; setEdt({ id: Date.now().toString(), name: i.value, days: [] }); i.value = ''; }}>Create</button></div>${ros.map(r => html`<div class="card flex justify-between items-center" onClick=${() => setEdt(r)}><div><h3 class="font-bold">${r.name}</h3><div class="text-xs text-muted">${r.days.length} Days</div></div><div class="text-muted">✎</div></div>`)}</div>`;
           };

           const rProg = () => {
               if (progEx) {
                   const exHis = his.filter(w => w.exs.some(e => e.name === progEx));
                   return html`<div><button class="ghost mb-4" onClick=${() => setProgEx(null)}>← Back</button><h2 class="font-bold text-lg mb-4">${progEx} Progress</h2>
                   ${exHis.map(w => {
                       const e = w.exs.find(x => x.name === progEx);
                       const b = e.sets.reduce((max, s) => ((Number(s.w)||0) * (Number(s.r)||0) > (Number(max.w)||0) * (Number(max.r)||0)) ? s : max, { w: 0, r: 0 });
                       const e1rm = Math.round((Number(b.w)||0) * (1 + (Number(b.r)||0) / 30));
                       return html`<div class="card"><div class="flex justify-between items-center mb-2 border-b border-[var(--surface-light)] pb-2"><span class="font-bold text-sm">${new Date(w.date).toLocaleDateString()}</span><span class="text-primary font-bold">e1RM: ${e1rm} lbs</span></div>
                       ${e.sets.filter(s=>s.c).map((s, i) => html`<div class="text-xs text-muted flex justify-between mb-1"><span>Set ${i+1}</span><span>${s.w} lbs x ${s.r} ${s.rpe ? `(@${s.rpe})` : ''}</span></div>`)}</div>`;
                   })}</div>`;
               }
               const allDoneExs = [...new Set(his.flatMap(w => w.exs.map(e => e.name)))];
               return html`<div><h2 class="font-bold text-lg mb-4">Progress</h2>${allDoneExs.map(eName => html`<div class="card flex justify-between items-center cursor-pointer mb-2" onClick=${() => setProgEx(eName)}><span class="font-bold">${eName}</span><span class="text-muted">→</span></div>`)}${allDoneExs.length === 0 ? html`<div class="text-muted text-center">No logged exercises yet.</div>` : ''}</div>`;
           };

           const rHis = () => {
               const recent = [...his].slice(0,7).reverse(); const maxVol = recent.length ? Math.max(...recent.map(w => calcVol(w)), 1) : 1;
               return html`<div><h2 class="font-bold text-lg mb-4">Log</h2>${his.length > 0 ? html`<div class="card mb-4 pt-2"><div class="text-xs text-muted font-bold uppercase tracking-wider mb-2 text-center">Recent Volume Trend</div><div class="chart-container">${recent.map(w => html`<div class="chart-bar-wrap"><div class="chart-bar" style="height:${Math.round((calcVol(w)/maxVol)*100)}%;"></div></div>`)}</div></div>` : ''}${his.map(w => html`<div class="card"><div class="flex justify-between items-center mb-2 border-b border-[var(--surface-light)] pb-2"><div><h3 class="font-bold text-sm">${w.name}</h3><span class="text-xs text-muted">${new Date(w.date).toLocaleDateString()}</span></div><button class="secondary" style="padding:6px;width:auto;" onClick=${() => { navigator.clipboard.writeText(formatShare(w)).then(()=>alert("Copied to clipboard!")).catch(()=>alert("Failed to copy")); }} title="Share">${Icons.share}</button></div>${w.note ? html`<div class="text-xs text-gray-400 italic mb-2">"${w.note}"</div>` : ''}${w.exs.map(e => { let b = e.sets.reduce((max, s) => ((Number(s.w)||0) * (Number(s.r)||0) > (Number(max.w)||0) * (Number(max.r)||0)) ? s : max, { w: 0, r: 0 }); let e1rm = Math.round((Number(b.w)||0) * (1 + (Number(b.r)||0) / 30)); return html`<div class="flex justify-between text-xs text-muted mb-1"><span>${e.sets.filter(s=>s.c).length}x ${e.name}</span>${b.w > 0 ? html`<span>Top: ${b.w}x${b.r} <span class="text-primary ml-1" title="Estimated 1 Rep Max">(e1RM: ${e1rm})</span></span>` : ''}</div>`; })}</div>`)}</div>`;
           };

           const rAI = () => {
               const [cht, setCht] = useState([]); const [ld, setLd] = useState(false);
               const send = async () => {
                   const v = document.getElementById('c-in').value; if (!v || !gem) return; document.getElementById('c-in').value = '';
                   let nc = [...cht, { u: true, t: v }]; setCht(nc); setLd(true);
                   try {
                       let c = "You are a concise powerlifting coach. Context:\n"; his.slice(0, 3).forEach(w => { c += `- ${w.name}: `; w.exs.forEach(e => c += `${e.name}(Max ${Math.max(...e.sets.map(s => s.w || 0))}lbs), `); c += '\n'; });
                       if(act) { c += `\nLIVE WORKOUT:\n${act.name}\n`; act.exs.forEach(e => { c += `${e.name}: `; e.sets.forEach(s => c += `[${s.w}x${s.r} ${s.c?'Done':'Pend'}] `); c += '\n'; }); }
                       c += `\nUser asks: ${v}`;
                       const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${gem}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: c }] }] }) });
                       if (!res.ok) throw new Error(`${res.status}`); const d = await res.json(); setCht([...nc, { u: false, t: d.candidates[0].content.parts[0].text }]);
                   } catch (e) { setCht([...nc, { u: false, t: `API Error: ${e.message}\nPlease check your API key in Settings.` }]); } setLd(false);
               };
               return html`<div class="flex-col h-full"><h2 class="font-bold text-lg mb-4">Coach</h2>${!gem ? html`<div class="text-xs text-danger mb-4">Add Key in Settings.</div>` : ''}<div class="flex-1 overflow-y-auto mb-4" style="min-height:200px;">${cht.map(m => html`<div class="msg ${m.u ? 'user' : 'bot'}">${m.t}</div>`)}${ld ? html`<div class="msg bot text-muted text-xs">Typing...</div>` : ''}</div><div class="flex gap-2"><input id="c-in" placeholder="Ask or paste routine..." onKeyDown=${e => e.key === 'Enter' && send()}/><button style="width:auto" onClick=${send}>Send</button></div></div>`;
           };

           const rSet = () => html`<div><h2 class="font-bold text-lg mb-4">Settings</h2><div class="card"><h3 class="font-bold mb-2">Cloud Account</h3><div class="text-xs text-success mb-4">✓ Logged in as ${user.email}</div><button class="danger text-sm" onClick=${() => auth.signOut()}>Logout</button></div><div class="card"><h3 class="font-bold mb-2">Gemini API Key</h3><input type="password" value=${gem} onInput=${e => { setGem(e.target.value); localStorage.setItem('pl_gemini_key', e.target.value); }} /></div><div class="card"><h3 class="font-bold mb-2">Data Management</h3><button class="secondary" onClick=${() => { const log = { format: "openweight", version: "1.0", workouts: his.map(w => ({ id: w.date.toString(), date: new Date(w.date).toISOString(), name: w.name, note: w.note||'', exercises: w.exs.map(e => ({ exercise: { name: e.name }, sets: e.sets.map(s => ({ weight: Number(s.w) || 0, weightUnit: "lb", reps: Number(s.r) || 0, rpe: Number(s.rpe) || null })) })) })) }; const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(log)], { type: 'application/json' })); a.download = `perfect_lift.json`; a.click(); }}>Export JSON Backup</button></div><div class="card"><h3 class="font-bold mb-2">Custom Exercises</h3><div class="flex gap-2 mb-2"><input id="n-ex" placeholder="Name" /><button style="width:auto" onClick=${() => { let v = document.getElementById('n-ex').value; if (v && !exs.includes(v)) save([...exs, v], ros, his); document.getElementById('n-ex').value = ''; }}>Add</button></div><div class="flex gap-2" style="flex-wrap:wrap">${exs.map((e, i) => html`<span class="text-xs bg-[var(--surface-light)] px-2 py-1 rounded" onClick=${() => { if (confirm('Delete?')) { let n = [...exs]; n.splice(i, 1); save(n, ros, his); } }}>${e} ✕</span>`)}</div></div></div>`;

           return html`<div id="app-container">${tmr > 0 ? html`<div class="timer-fab" onClick=${() => setTmr(0)}>${Math.floor(tmr / 60)}:${(tmr % 60).toString().padStart(2, '0')}</div>` : ''}${renderExModal()}${renderSumModal()}${plateCalc !== null ? html`<div class="modal" onClick=${(e) => e.target.className==='modal' && setPlateCalc(null)} style="justify-content:center;align-items:center;background:rgba(0,0,0,0.8);"><div class="card" style="width:100%;max-width:300px;text-align:center;"><h3 class="font-bold mb-2">Plate Math (${plateCalc} lbs)</h3><div class="flex gap-2 justify-center mb-4">${[35, 45, 55, 65].map(b => html`<button class=${barWeight === b ? 'success' : 'secondary'} style="padding:4px 8px; width:auto; font-size:12px;" onClick=${() => setBarWeight(b)}>${b}lb bar</button>`)}</div><div class="text-primary font-bold text-lg mb-4">${calcPlates(plateCalc, barWeight)}</div><button onClick=${() => setPlateCalc(null)}>Close</button></div></div>` : ''}<div class="content">${tab === 'workout' && !sumMod && rWrk()}${tab === 'routines' && rRtn()}${tab === 'progress' && rProg()}${tab === 'history' && rHis()}${tab === 'ai' && rAI()}${tab === 'settings' && rSet()}</div>${!act && !exMod && !sumMod ? html`<div class="nav">${[{ i: 'workout', c: Icons.lift, l: 'Lift' }, { i: 'routines', c: Icons.plan, l: 'Plan' }, { i: 'progress', c: Icons.trend, l: 'Prog' }, { i: 'history', c: Icons.log, l: 'Log' }, { i: 'ai', c: Icons.ai, l: 'Coach' }, { i: 'settings', c: Icons.settings, l: 'Set' }].map(t => html`<button class="nav-btn ${tab === t.i ? 'active' : ''}" onClick=${() => setTab(t.i)}>${t.c}<span>${t.l}</span></button>`)}</div>` : ''}</div>`;
       };
       render(html`<${App}/>`, document.getElementById('root'));
   </script>
</body>
</html>
