<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
   <title>Perfect Lift</title>
   <style>
       :root{--bg:#111827;--surface:#1f2937;--surface-light:#374151;--primary:#2563eb;--success:#16a34a;--danger:#dc2626;--text:#f3f4f6;--text-muted:#9ca3af;}
       *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
       body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;overscroll-behavior-y:none;}
       input,select,textarea{font-size:16px;background:var(--surface-light);color:var(--text);border:none;border-radius:8px;padding:12px;width:100%;outline:none;}
       button{background:var(--primary);color:white;border:none;padding:12px;border-radius:8px;font-weight:bold;cursor:pointer;width:100%;display:flex;justify-content:center;align-items:center;gap:8px;font-size:16px;}
       button.ghost{background:transparent;color:var(--primary);width:auto;padding:8px;}
       button.danger{background:var(--danger);width:auto;padding:8px;}
       button.success{background:var(--success);}
       button.secondary{background:var(--surface-light);color:var(--text);}
       #app-container{display:flex;flex-direction:column;height:100vh;max-width:500px;margin:0 auto;position:relative;background:var(--bg);}
       .content{flex:1;overflow-y:auto;padding:16px;padding-bottom:80px;}
       .card{background:var(--surface);border-radius:12px;padding:16px;margin-bottom:16px;}
       .flex{display:flex;} .flex-col{display:flex;flex-direction:column;} .justify-between{justify-content:space-between;} .items-center{align-items:center;} .gap-2{gap:8px;}
       .text-sm{font-size:.875rem;} .text-xs{font-size:.75rem;} .font-bold{font-weight:bold;} .text-muted{color:var(--text-muted);} .text-primary{color:var(--primary);}
       .grid-sets{display:grid;grid-template-columns:40px 1fr 1fr 1fr 40px;gap:8px;align-items:center;margin-bottom:8px;} .grid-sets input{padding:8px 4px;text-align:center;}
       .nav{position:absolute;bottom:0;left:0;right:0;background:var(--surface);display:flex;padding-bottom:env(safe-area-inset-bottom, 0px);border-top:1px solid var(--surface-light);z-index:40;}
       .nav-btn{flex:1;background:transparent;flex-direction:column;color:var(--text-muted);padding:12px 0;border-radius:0;gap:4px;} .nav-btn.active{color:var(--primary);}
       .nav-btn svg{width:24px;height:24px;fill:currentColor;}
       .timer-fab{position:absolute;top:16px;right:16px;background:var(--primary);padding:8px 16px;border-radius:24px;font-family:monospace;font-weight:bold;z-index:50;}
       .msg{padding:12px;border-radius:12px;max-width:85%;margin-bottom:12px;white-space:pre-wrap;font-size:15px;}
       .msg.user{background:var(--primary);margin-left:auto;border-bottom-right-radius:4px;} .msg.bot{background:var(--surface);margin-right:auto;border-bottom-left-radius:4px;}
       .hide{display:none;}
   </style>
   <script src="https://unpkg.com/preact@10.22.0/dist/preact.umd.js"></script>
   <script src="https://unpkg.com/preact@10.22.0/hooks/dist/hooks.umd.js"></script>
   <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
   <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
   <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
   <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
   <div id="root"></div>
   <script>
       const { h, render } = preact; const { useState, useEffect } = preactHooks; const html = htm.bind(h);

       const Icons = {
           lift: html`<svg viewBox="0 0 24 24"><path d="M20.5 10H19V7c0-1.1-.9-2-2-2h-2V3h-2v2H11V3H9v2H7c-1.1 0-2 .9-2 2v3H3.5c-.8 0-1.5.7-1.5 1.5v1c0 .8.7 1.5 1.5 1.5H5v3c0 1.1.9 2 2 2h2v2h2v-2h2v2h2v-2h2c1.1 0 2-.9 2-2v-3h1.5c.8 0 1.5-.7 1.5-1.5v-1c0-.8-.7-1.5-1.5-1.5z"/></svg>`,
           plan: html`<svg viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>`,
           log: html`<svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>`,
           ai: html`<svg viewBox="0 0 24 24"><path d="M21 11c0-1.66-1.34-3-3-3h-1V6c0-1.66-1.34-3-3-3H10C8.34 3 7 4.34 7 6v2H6c-1.66 0-3 1.34-3 3v2c0 1.66 1.34 3 3 3h1v2c0 1.66 1.34 3 3 3h4c1.66 0 3-1.34 3-3v-2h1c1.66 0 3-1.34 3-3v-2zM9 13c-.83 0-1.5-.67-1.5-1.5S8.17 10 9 10s1.5.67 1.5 1.5S9.83 13 9 13zm6 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>`,
           settings: html`<svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>`,
           trash: html`<svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor;"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>`,
           check: html`<svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:currentColor;"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>`,
           swap: html`<svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor;"><path d="M16 17.01V10h-2v7.01h-3L15 21l4-3.99h-3zM9 3L5 6.99h3V14h2V6.99h3L9 3z"/></svg>`
       };

       if (!firebase.apps.length) firebase.initializeApp({ apiKey: "AIzaSyCFUp7gU8ef2eoz4CypW3yHH2m0nWmqmC0", authDomain: "perfect-lift-3f1a4.firebaseapp.com", projectId: "perfect-lift-3f1a4" });
       const auth = firebase.auth(); const db = firebase.firestore();
       
       // Base Data
       const defExs = ["Bench Press", "Squat", "Trap Bar Deadlift", "Overhead Press", "Barbell Row", "Pull Up", "Dips", "RDL"];
       const zombSplit = { id: 'zomb', name: 'Zombie Apocalypse Split', days: [
           { name: 'Day 1: Heavy Push', ex: ['Bench Press', 'Overhead Press', 'Dips'] },
           { name: 'Day 2: Heavy Pull', ex: ['Trap Bar Deadlift', 'Barbell Row', 'Pull Up'] },
           { name: 'Day 3: Volume Push', ex: ['Overhead Press', 'Bench Press'] },
           { name: 'Day 4: Legs & Core', ex: ['Squat', 'RDL'] }
       ]};

       const App = () => {
           const [tab, setTab] = useState('workout');
           const [exs, setExs] = useState(defExs);
           const [ros, setRos] = useState([zombSplit]);
           const [his, setHis] = useState([]);
           const [act, setAct] = useState(null);
           const [edt, setEdt] = useState(null);
           const [swp, setSwp] = useState(null);
           const [tmr, setTmr] = useState(0);
           const [gem, setGem] = useState(localStorage.getItem('pl_gemini_key') || '');
           const [dbRef, setDbRef] = useState(null);

           useEffect(() => {
               let unsub = () => {};
               auth.signInAnonymously().catch(e => console.error(e));
               const auSub = auth.onAuthStateChanged(u => {
                   if (u) {
                       const ref = db.collection('artifacts').doc('perfect-lift').collection('users').doc(u.uid).collection('data').doc('main');
                       setDbRef(ref);
                       unsub = ref.onSnapshot(s => {
                           if (s.exists) { const d = s.data(); if (d.exs) setExs(d.exs); if (d.ros) setRos(d.ros); if (d.his) setHis(d.his); }
                       });
                   }
               });
               return () => { auSub(); unsub(); };
           }, []);

           const save = (e, r, h) => { setExs(e); setRos(r); setHis(h); if (dbRef) dbRef.set({ exs: e, ros: r, his: h }, { merge: true }); };

           useEffect(() => {
               if (tmr <= 0) return;
               const int = setInterval(() => setTmr(t => t - 1), 1000);
               if (tmr === 1 && navigator.vibrate) navigator.vibrate([300, 100, 300]);
               return () => clearInterval(int);
           }, [tmr]);

           const getProgression = (n) => {
               for (let w of his) for (let e of w.exs) if (e.name === n && e.sets.length > 0) {
                   let m = Math.max(...e.sets.map(s => Number(s.w) || 0));
                   let repsHit = e.sets.every(s => s.c && Number(s.r) > 0);
                   return m > 0 ? (repsHit ? m + 5 : m).toString() : '';
               } return '';
           };

           const rWrk = () => {
               if (!act) return html`<div><h2 class="font-bold text-lg mb-4">Start Workout</h2>
                   ${ros.map(r => html`<div class="card"><h3 class="font-bold mb-2">${r.name}</h3><div class="flex gap-2" style="overflow-x:auto;">
                   ${r.days.map(d => html`<button class="secondary text-sm" style="width:auto;white-space:nowrap;" onClick=${() => setAct({ name: `${r.name} - ${d.name}`, date: Date.now(), exs: d.ex.map(e => ({ name: e, sets: [{ w: getProgression(e), r: '', rpe: '', c: false }] })) })}>${d.name}</button>`)}
                   </div></div>`)}<button class="secondary mt-4" onClick=${() => setAct({ name: 'Custom Workout', date: Date.now(), exs: [] })}>Start Empty</button></div>`;
               
               if (swp !== null) return html`<div><h2 class="font-bold text-lg mb-4">Swap Exercise</h2>
                   <select onChange=${e => { if(!e.target.value)return; let nw = {...act}; nw.exs[swp].name = e.target.value; setAct(nw); setSwp(null); }} size="8" style="height:auto">
                   <option value="">Cancel / Pick New</option>${exs.map(e => html`<option value=${e}>${e}</option>`)}</select></div>`;

               return html`<div><div class="flex justify-between items-center mb-4"><h2 class="font-bold">${act.name}</h2>
                   <button class="success" style="width:auto;padding:6px 16px;" onClick=${() => { save(exs, ros, [{ ...act, date: Date.now() }, ...his]); setAct(null); setTmr(0); }}>Finish</button></div>
                   ${act.exs.map((ex, eI) => html`<div class="card" style="padding:12px;">
                       <div class="flex justify-between items-center mb-2"><h3 class="font-bold text-primary">${ex.name}</h3>
                       <div class="flex gap-2"><button class="secondary" onClick=${() => setSwp(eI)}>${Icons.swap}</button><button class="danger" onClick=${() => { let nw = { ...act }; nw.exs.splice(eI, 1); setAct(nw); }}>${Icons.trash}</button></div></div>
                       <div class="grid-sets text-xs text-muted font-bold" style="margin-bottom:4px;"><div style="text-align:center;">SET</div><div>LBS</div><div>REPS</div><div>RPE</div><div style="text-align:center;">✓</div></div>
                       ${ex.sets.map((set, sI) => html`<div class="grid-sets" style="opacity:${set.c ? 0.5 : 1};">
                           <div class="text-sm font-bold" style="text-align:center;background:var(--surface-light);padding:8px;border-radius:8px;">${sI + 1}</div>
                           <input type="number" placeholder="-" value=${set.w} onInput=${e => { let nw = { ...act }; nw.exs[eI].sets[sI].w = e.target.value; setAct(nw); }}/>
                           <input type="number" placeholder="-" value=${set.r} onInput=${e => { let nw = { ...act }; nw.exs[eI].sets[sI].r = e.target.value; setAct(nw); }}/>
                           <input type="number" placeholder="-" value=${set.rpe} onInput=${e => { let nw = { ...act }; nw.exs[eI].sets[sI].rpe = e.target.value; setAct(nw); }}/>
                           <button class=${set.c ? 'success' : 'secondary'} style="padding:8px;" onClick=${() => { let nw = { ...act }; nw.exs[eI].sets[sI].c = !nw.exs[eI].sets[sI].c; if (nw.exs[eI].sets[sI].c) setTmr(90); setAct(nw); }}>${Icons.check}</button>
                       </div>`)}
                       <button class="ghost text-sm mt-2" onClick=${() => { let nw = { ...act }; let lst = nw.exs[eI].sets[nw.exs[eI].sets.length - 1]; nw.exs[eI].sets.push(lst ? { ...lst, c: false } : { w: '', r: '', rpe: '', c: false }); setAct(nw); }}>+ Add Set</button>
                   </div>`)}
                   <select class="mt-4" onChange=${e => { if (!e.target.value) return; let nw = { ...act }; nw.exs.push({ name: e.target.value, sets: [{ w: getProgression(e.target.value), r: '', rpe: '', c: false }] }); setAct(nw); e.target.value = ""; }}>
                       <option value="">+ Add Exercise</option>${exs.map(e => html`<option value=${e}>${e}</option>`)}
                   </select></div>`;
           };

           const rRtn = () => {
               if (edt) return html`<div><button class="ghost mb-2" onClick=${() => setEdt(null)}>← Back</button>
                   <input class="font-bold mb-4 text-lg" value=${edt.name} onInput=${e => setEdt({ ...edt, name: e.target.value })} />
                   ${edt.days.map((d, dI) => html`<div class="card"><div class="flex justify-between items-center mb-4 gap-2">
                       <input class="font-bold" value=${d.name} onInput=${e => { let nr = { ...edt }; nr.days[dI].name = e.target.value; setEdt(nr); }} />
                       <button class="danger" onClick=${() => { let nr = { ...edt }; nr.days.splice(dI, 1); setEdt(nr); }}>${Icons.trash}</button></div>
                       ${d.ex.map((e, eI) => html`<div class="flex justify-between items-center mb-2 bg-[var(--surface-light)] p-2 rounded"><span class="text-sm">${e}</span>
                       <button class="danger" style="padding:4px 8px" onClick=${() => { let nr = { ...edt }; nr.days[dI].ex.splice(eI, 1); setEdt(nr); }}>✕</button></div>`)}
                       <select class="mt-2 text-sm" onChange=${e => { if (!e.target.value) return; let nr = { ...edt }; nr.days[dI].ex.push(e.target.value); setEdt(nr); e.target.value = ""; }}>
                       <option value="">+ Add Exercise</option>${exs.map(x => html`<option value=${x}>${x}</option>`)}</select>
                   </div>`)}
                   <button class="secondary mb-4" onClick=${() => setEdt({ ...edt, days: [...edt.days, { name: `Day ${edt.days.length + 1}`, ex: [] }] })}>+ Add Day</button>
                   <button onClick=${() => { let ro = [...ros]; let i = ro.findIndex(r => r.id === edt.id); if (i > -1) ro[i] = edt; else ro.push(edt); save(exs, ro, his); setEdt(null); }}>Save</button></div>`;
               return html`<div><h2 class="font-bold text-lg mb-4">Routines</h2><div class="flex gap-2 mb-4"><input id="n-ro" placeholder="New Name" />
                   <button style="width:auto" onClick=${() => { const i = document.getElementById('n-ro'); if (!i.value) return; setEdt({ id: Date.now().toString(), name: i.value, days: [] }); i.value = ''; }}>Create</button></div>
                   ${ros.map(r => html`<div class="card flex justify-between items-center" onClick=${() => setEdt(r)}><div><h3 class="font-bold">${r.name}</h3><div class="text-xs text-muted">${r.days.length} Days</div></div><div class="text-muted">✎</div></div>`)}</div>`;
           };

           const rHis = () => html`<div><h2 class="font-bold text-lg mb-4">Log</h2>${his.map(w => html`<div class="card"><div class="flex justify-between items-center mb-2 border-b border-[var(--surface-light)] pb-2"><h3 class="font-bold text-sm">${w.name}</h3><span class="text-xs text-muted">${new Date(w.date).toLocaleDateString()}</span></div>
               ${w.exs.map(e => { 
                   let b = e.sets.reduce((max, s) => (s.w * s.r > max.w * max.r) ? s : max, { w: 0, r: 0 }); 
                   let e1rm = Math.round(b.w * (1 + b.r / 30));
                   return html`<div class="flex justify-between text-xs text-muted mb-1"><span>${e.sets.length}x ${e.name}</span>${b.w > 0 ? html`<span>Top: ${b.w}x${b.r} <span class="text-primary">(e1RM: ${e1rm})</span></span>` : ''}</div>`; 
               })}</div>`)}</div>`;

           const rAI = () => {
               const [cht, setCht] = useState([]); const [ld, setLd] = useState(false);
               const send = async () => {
                   const v = document.getElementById('c-in').value; if (!v || !gem) return; document.getElementById('c-in').value = '';
                   let nc = [...cht, { u: true, t: v }]; setCht(nc); setLd(true);
                   try {
                       let c = "You convert user text to JSON or answer powerlifting queries. User asks: " + v;
                       const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${gem}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: c }] }] }) });
                       const d = await res.json(); setCht([...nc, { u: false, t: d.candidates[0].content.parts[0].text }]);
                   } catch (e) { setCht([...nc, { u: false, t: "Error" }]); } setLd(false);
               };
               return html`<div class="flex-col h-full"><h2 class="font-bold text-lg mb-4">Coach</h2>${!gem ? html`<div class="text-xs text-danger mb-4">Add Key in Settings.</div>` : ''}
                   <div class="flex-1 overflow-y-auto mb-4" style="min-height:200px;">${cht.map(m => html`<div class="msg ${m.u ? 'user' : 'bot'}">${m.t}</div>`)}${ld ? html`<div class="msg bot text-muted text-xs">Typing...</div>` : ''}</div>
                   <div class="flex gap-2"><input id="c-in" placeholder="Ask or paste routine..." onKeyDown=${e => e.key === 'Enter' && send()}/><button style="width:auto" onClick=${send}>Send</button></div></div>`;
           };

           const hFile = (e) => {
               const f = e.target.files[0]; if(!f) return; const r = new FileReader();
               r.onload = ev => { try { const d = JSON.parse(ev.target.result); if(d.workouts) {
                   const nh = d.workouts.map(w => ({ name: w.name, date: new Date(w.date).getTime(), exs: w.exercises.map(x => ({ name: x.exercise.name, sets: x.sets.map(s => ({w:s.weight||'', r:s.reps||'', rpe:s.rpe||'', c:true})) })) }));
                   save(exs, ros, [...his, ...nh]); alert("Imported!");
               } } catch(err) { alert("Invalid JSON"); } }; r.readAsText(f);
           };

           const rSet = () => html`<div><h2 class="font-bold text-lg mb-4">Settings</h2>
               <div class="card"><h3 class="font-bold mb-2">Cloud</h3><div class="text-xs text-success mb-2">✓ Active</div>
               <label class="text-xs text-muted mt-2">Gemini API Key</label><input type="password" class="mt-1" value=${gem} onInput=${e => { setGem(e.target.value); localStorage.setItem('pl_gemini_key', e.target.value); }} /></div>
               <div class="card"><h3 class="font-bold mb-2">Data</h3>
               <label class="secondary" style="display:flex;justify-content:center;padding:12px;border-radius:8px;font-weight:bold;margin-bottom:8px;">Import OpenWeight JSON<input type="file" accept=".json" onChange=${hFile} class="hide"/></label>
               <button class="secondary" onClick=${() => {
                   const log = { format: "openweight", version: "1.0", workouts: his.map(w => ({ id: w.date.toString(), date: new Date(w.date).toISOString(), name: w.name, exercises: w.exs.map(e => ({ exercise: { name: e.name }, sets: e.sets.map(s => ({ weight: Number(s.w) || 0, weightUnit: "lb", reps: Number(s.r) || 0, rpe: Number(s.rpe) || null })) })) })) };
                   const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(log)], { type: 'application/json' })); a.download = `perfect_lift.json`; a.click();
               }}>Export JSON</button></div>
               <div class="card"><h3 class="font-bold mb-2">Exercises</h3><div class="flex gap-2 mb-2"><input id="n-ex" placeholder="Name" /><button style="width:auto" onClick=${() => { let v = document.getElementById('n-ex').value; if (v && !exs.includes(v)) save([...exs, v], ros, his); document.getElementById('n-ex').value = ''; }}>Add</button></div>
               <div class="flex gap-2" style="flex-wrap:wrap">${exs.map((e, i) => html`<span class="text-xs bg-[var(--surface-light)] px-2 py-1 rounded" onClick=${() => { if (confirm('Delete?')) { let n = [...exs]; n.splice(i, 1); save(n, ros, his); } }}>${e} ✕</span>`)}</div></div></div>`;

           return html`<div id="app-container">${tmr > 0 ? html`<div class="timer-fab" onClick=${() => setTmr(0)}>${Math.floor(tmr / 60)}:${(tmr % 60).toString().padStart(2, '0')}</div>` : ''}
               <div class="content">${tab === 'workout' && rWrk()}${tab === 'routines' && rRtn()}${tab === 'history' && rHis()}${tab === 'ai' && rAI()}${tab === 'settings' && rSet()}</div>
               ${!act ? html`<div class="nav">${[{ i: 'workout', c: Icons.lift, l: 'Lift' }, { i: 'routines', c: Icons.plan, l: 'Plan' }, { i: 'history', c: Icons.log, l: 'Log' }, { i: 'ai', c: Icons.ai, l: 'Coach' }, { i: 'settings', c: Icons.settings, l: 'Settings' }].map(t => html`<button class="nav-btn ${tab === t.i ? 'active' : ''}" onClick=${() => setTab(t.i)}>${t.c}<span style="font-size:10px;font-weight:bold;text-transform:uppercase;">${t.l}</span></button>`)}</div>` : ''}</div>`;
       };

       render(html`<${App}/>`, document.getElementById('root'));
   </script>
</body>
</html>
